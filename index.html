<!DOCTYPE html>
<html lang="und">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hong Seungwoo | Frontend Developer Portfolio</title>
    <meta
        name="description"
        content="Hong Seungwoo's portfolio website focused on frontend development and polished user experience."
    >
    <meta name="author" content="Hong Seungwoo">
    <meta name="robots" content="index, follow">
    <meta name="theme-color" content="#07090f">
    <meta name="format-detection" content="telephone=no, date=no, email=no, address=no">
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Hong Seungwoo Portfolio">
    <meta property="og:title" content="Hong Seungwoo | Frontend Developer Portfolio">
    <meta
        property="og:description"
        content="Hong Seungwoo's portfolio website focused on frontend development and polished user experience."

    <meta name="twitter:title" content="Hong Seungwoo | Frontend Developer Portfolio">
    <meta
        name="twitter:description"
        content="Hong Seungwoo's portfolio website focused on frontend development and polished user experience."
    >

    <script>
        (() => {
            const STORAGE_KEY = "portfolio-language";
            const supportedLanguages = new Set(["ko", "ja", "en"]);
            const storedLanguage = (() => {
                try {
                    return localStorage.getItem(STORAGE_KEY);
                } catch {
                    return null;
                }
            })();

            const detectSystemLanguage = () => {
                const locales = Array.isArray(navigator.languages) && navigator.languages.length > 0
                    ? navigator.languages
                    : [navigator.language || ""];

                if (locales.some((locale) => String(locale).toLowerCase().startsWith("ko"))) {
                    return "ko";
                }

                if (locales.some((locale) => String(locale).toLowerCase().startsWith("ja"))) {
                    return "ja";
                }

                return "en";
            };

            const initialLanguage = supportedLanguages.has(storedLanguage)
                ? storedLanguage
                : detectSystemLanguage();

            document.documentElement.lang = initialLanguage;
            document.documentElement.dataset.language = initialLanguage;
            document.documentElement.classList.add("is-loading");
        })();
    </script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/loading.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/header-controls.css">
    <link rel="stylesheet" href="css/overview.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/language-transition.css">

    <script type="module" src="js/main.js"></script>
</head>
<body>

            <div class="loading-screen__bar" aria-hidden="true">

        </div>
    </div>

            <div class="header__actions">

                    role="group"
                    data-i18n="language_switcher_label"
                    data-i18n-attr="aria-label"
                >
                    <button

                        type="button"
                        data-lang="ko"
                        aria-label="한국어"
                        aria-pressed="true"

                        <span class="lang-switch__label">KR</span>
                    </button>
                    <button
                        class="lang-switch__button"
                        type="button"
                        data-lang="ja"
                        aria-label="日本語"
                        aria-pressed="false"
                    >
                        <span class="lang-switch__label">JP</span>
                    </button>
                    <button

                        type="button"
                        data-lang="en"
                        aria-label="English"
                        aria-pressed="false"
                    >
                        <span class="lang-switch__label">EN</span>
                    </button>
                </div>

                <button
                    class="menu-toggle"
                    id="menuToggle"
                    data-menu-toggle
                    type="button"
                    aria-label="Open menu"
                    aria-expanded="false"
                    aria-controls="mobileMenu"

                    <span></span>

            </div>

                            <div class="overview__panel-item">

                                <dd data-i18n="overview_panel_item_value_1"></dd>

        <!-- About Me -->
