    <script>
        (() => {
            window.__portfolioHeadContent = Object.freeze({
                ko: Object.freeze({
                    title: "홍승우의 포트폴리오",
                    description: "T자형 엔지니어를 지향하며 웹 개발 전반의 이해를 바탕으로, 특히 백엔드 설계와 클라우드 아키텍처 분야의 전문성을 키우고 있습니다.",
                    siteName: "홍승우의 포트폴리오",
                    locale: "ko_KR"
                }),
                ja: Object.freeze({
                    title: "ホンスンウのポートフォリオ",
                    description: "T字型エンジニアを目指し、Web開発全般への理解を土台に、特にバックエンド設計とクラウドアーキテクチャの専門性を深めています。",
                    siteName: "ホンスンウのポートフォリオ",
                    locale: "ja_JP"
                }),
                en: Object.freeze({
                    title: "Hong Seungwoo's Web Portfolio",
                    description: "Building toward a T-shaped engineering profile with a broad grounding in web development, while deepening expertise in backend architecture and cloud design.",
                    siteName: "Hong Seungwoo's Web Portfolio",
                    locale: "en_US"
                })
            });

            const STORAGE_KEY = "portfolio-language";
            const supportedLanguages = new Set(["ko", "ja", "en"]);
            const headContent = window.__portfolioHeadContent ?? {};
            const storedLanguage = (() => {
                try {
                    return localStorage.getItem(STORAGE_KEY);
                } catch {
                    return null;
                }
            })();

            const detectSystemLanguage = () => {
                const locales = Array.isArray(navigator.languages) && navigator.languages.length > 0
                    ? navigator.languages
                    : [navigator.language || ""];

                if (locales.some((locale) => String(locale).toLowerCase().startsWith("ko"))) {
                    return "ko";
                }

                if (locales.some((locale) => String(locale).toLowerCase().startsWith("ja"))) {
                    return "ja";
                }

                return "en";
            };

            const initialLanguage = supportedLanguages.has(storedLanguage)
                ? storedLanguage
                : detectSystemLanguage();

            const setMetaContent = (selector, value) => {
                const element = document.querySelector(selector);

                if (element && typeof value === "string") {
                    element.setAttribute("content", value);
                }
            };

            const applyHeadContent = (language) => {
                const fallbackContent = headContent.en ?? {};
                const nextHeadContent = headContent[language] ?? fallbackContent;

                if (!nextHeadContent || typeof nextHeadContent !== "object") {
                    return;
                }

                if (typeof nextHeadContent.title === "string") {
                    document.title = nextHeadContent.title;
                }

                setMetaContent('meta[name="description"]', nextHeadContent.description);
                setMetaContent('meta[property="og:site_name"]', nextHeadContent.siteName);
                setMetaContent('meta[property="og:title"]', nextHeadContent.title);
                setMetaContent('meta[property="og:description"]', nextHeadContent.description);
                setMetaContent('meta[property="og:locale"]', nextHeadContent.locale);
                setMetaContent('meta[name="twitter:title"]', nextHeadContent.title);
                setMetaContent('meta[name="twitter:description"]', nextHeadContent.description);
            };

            document.documentElement.lang = initialLanguage;
            document.documentElement.dataset.language = initialLanguage;
            applyHeadContent(initialLanguage);
            document.documentElement.classList.add("is-loading");
        })();
    </script>

    <script>
        (() => {
            const BOOT_TIMEOUT_MS = 4000;

            const releaseLoading = () => {
                document.documentElement.classList.remove("is-loading");

                const loadingScreen = document.getElementById("loadingScreen");

                if (loadingScreen) {
                    loadingScreen.setAttribute("aria-hidden", "true");
                }
            };

            let timeoutId = 0;

            const bootState = {
                isReady: false,
                markReady() {
                    this.isReady = true;
                    window.clearTimeout(timeoutId);
                },
                fail() {
                    if (this.isReady) {
                        return;
                    }

                    releaseLoading();
                }
            };

            timeoutId = window.setTimeout(() => {
                bootState.fail();
            }, BOOT_TIMEOUT_MS);

            window.__portfolioBoot = bootState;
            window.addEventListener("error", () => bootState.fail(), { once: true });
            window.addEventListener("unhandledrejection", () => bootState.fail(), { once: true });
        })();
    </script>
